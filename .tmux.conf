# =============================================================================
# 基本設定
# =============================================================================

# True Color対応（Ghostty/modern terminal向け）
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ベースインデックスを1始まりに
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# スクロールバックバッファ拡大
set -g history-limit 50000

# Escキーの遅延解消（vim向け）
set -sg escape-time 0

# フォーカスイベント有効化
set -g focus-events on

# マウスサポート
set -g mouse on

# =============================================================================
# キーバインド
# =============================================================================

# prefix は Ctrl-b を維持
set -g prefix C-b

# 設定リロード
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# ペイン分割（直感的なキー、カレントディレクトリを引き継ぎ）
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# vim風ペイン移動
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインリサイズ（prefix + H/J/K/L、リピート可能）
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ウィンドウ切り替え（Alt+矢印、prefix不要）
bind -n M-Left previous-window
bind -n M-Right next-window

# 新しいウィンドウ（カレントディレクトリを引き継ぎ）
bind c new-window -c "#{pane_current_path}"

# コピーモード（vi風）
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# =============================================================================
# ステータスバー（Catppuccin Mocha風）
# =============================================================================

# 基本設定
set -g status-position bottom
set -g status-interval 5
set -g status-justify left

# 配色
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# 左側: セッション名
set -g status-left-length 30
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold]  #S #[bg=#1e1e2e,fg=#89b4fa]"

# 右側: ホスト名 | 日時
set -g status-right-length 60
set -g status-right "#[fg=#45475a]#[bg=#45475a,fg=#cdd6f4]  #H #[bg=#89b4fa,fg=#1e1e2e,bold] %m/%d %H:%M "

# ウィンドウステータス
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#a6e3a1,bold] #I:#W #[fg=#a6e3a1,bg=#1e1e2e]"

# メッセージ
set -g message-style "bg=#89b4fa,fg=#1e1e2e,bold"

# =============================================================================
# ペイン表示
# =============================================================================

# アクティブペインの視覚的区別
set -g window-style "fg=#a6adc8"
set -g window-active-style "fg=#cdd6f4"

# ペインボーダー
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# ペインボーダーステータス
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#89b4fa] #P:#pane_current_command ,#[fg=#585b70] #P:#pane_current_command }"

# =============================================================================
# TPM（プラグインマネージャ）
# =============================================================================

# TPM自動インストール
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"

# プラグイン
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'    # セッション保存/復元
set -g @plugin 'tmux-plugins/tmux-continuum'     # 自動保存
set -g @plugin 'tmux-plugins/tmux-open'          # ファイル/URLを開く

# tmux-resurrect設定
set -g @resurrect-capture-pane-contents 'on'

# tmux-continuum設定
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# TPM初期化（設定ファイル末尾に配置必須）
run '~/.tmux/plugins/tpm/tpm'
