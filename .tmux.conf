# tmux default key bindings (Ctrl-b prefix)

set -g prefix C-b
set -g default-terminal "screen-256color"

# Enable mouse support
set -g mouse on

# Active pane highlight
set -g window-style 'bg=colour235'
set -g window-active-style 'bg=colour0'
set -g pane-border-style 'fg=colour238,bg=colour238'
set -g pane-active-border-style 'fg=colour46,bg=colour46'
set -g pane-border-lines heavy

# Pane border with indicator
set -g pane-border-status top
set -g pane-border-format '#{?pane_active,#[bg=colour46]#[fg=colour0]#[bold] ACTIVE #[default],#[bg=colour238]#[fg=colour250] #P #[default]}'

# Status bar
set -g status-right " Pane:#P "
